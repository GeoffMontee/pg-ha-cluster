---
# Common packages to install
common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - python3-pip
  - python3-psycopg2
  - acl
  - net-tools
  - vim
  - htop
  - xfsprogs

# Optional local NVMe storage for PostgreSQL data.
local_nvme_mount_enabled: false
local_nvme_device: ""
local_nvme_mount_point: "/var/lib/postgresql"
local_nvme_filesystem: "xfs"
