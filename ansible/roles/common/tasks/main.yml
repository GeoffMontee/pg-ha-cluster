---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  become: true

- name: Discover local NVMe device for PostgreSQL data
  ansible.builtin.shell: |
    set -euo pipefail
    root_source="$(findmnt -n -o SOURCE /)"
    root_device="$(readlink -f "$root_source" || printf '%s' "$root_source")"
    root_parent="$(lsblk -no PKNAME "$root_device" | sed -n '1p')"
    if [ -z "$root_parent" ]; then
      root_parent="$(basename "$root_device")"
    fi
    lsblk -ndo NAME,TYPE,MOUNTPOINT | awk -v root="$root_parent" '$2=="disk" && $3=="" && $1 != root && $1 ~ /^nvme/ {print "/dev/" $1; exit}'
  args:
    executable: /bin/bash
  register: discovered_local_nvme
  changed_when: false
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
    - local_nvme_device | length == 0
  become: true

- name: Select local NVMe device for PostgreSQL data
  ansible.builtin.set_fact:
    pg_local_nvme_device: "{{ local_nvme_device if local_nvme_device | length > 0 else discovered_local_nvme.stdout }}"
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool

- name: Fail when local NVMe storage is requested but not found
  ansible.builtin.fail:
    msg: "local_nvme_mount_enabled is true, but no non-root NVMe disk was found. Use an instance type with local NVMe storage, set local_nvme_device, or disable local NVMe."
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
    - pg_local_nvme_device | default('') | length == 0

- name: Create filesystem on local NVMe device
  community.general.filesystem:
    dev: "{{ pg_local_nvme_device }}"
    fstype: "{{ local_nvme_filesystem }}"
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
  become: true

- name: Ensure local NVMe mount point exists
  ansible.builtin.file:
    path: "{{ local_nvme_mount_point }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
  become: true

- name: Get local NVMe filesystem UUID
  ansible.builtin.command: "blkid -s UUID -o value {{ pg_local_nvme_device }}"
  register: local_nvme_uuid
  changed_when: false
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
  become: true

- name: Persist local NVMe mount in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+{{ local_nvme_mount_point }}\s+'
    line: "UUID={{ local_nvme_uuid.stdout }} {{ local_nvme_mount_point }} {{ local_nvme_filesystem }} defaults,noatime,nofail 0 2"
    state: present
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
  become: true

- name: Check local NVMe mount status
  ansible.builtin.command: "findmnt -n {{ local_nvme_mount_point }}"
  register: local_nvme_mount_status
  changed_when: false
  failed_when: false
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
  become: true

- name: Mount local NVMe storage for PostgreSQL data
  ansible.builtin.command: "mount {{ local_nvme_mount_point }}"
  when:
    - "'pg_cluster' in group_names"
    - local_nvme_mount_enabled | bool
    - local_nvme_mount_status.rc != 0
  become: true

- name: Set timezone
  ansible.builtin.timezone:
    name: UTC
  become: true

- name: Configure /etc/hosts for cluster nodes
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].private_ip }} {{ item }}"
    state: present
  loop: "{{ groups['all'] }}"
  when: hostvars[item].private_ip is defined
  become: true

- name: Disable swap (recommended for databases)
  ansible.builtin.command: swapoff -a
  become: true
  changed_when: false
  when: "'pg_cluster' in group_names"

- name: Remove swap from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  become: true
  when: "'pg_cluster' in group_names"

- name: Configure sysctl for PostgreSQL
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-postgresql-ha.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      vm.swappiness = 1
      vm.overcommit_memory = 2
      net.core.somaxconn = 65535
      net.ipv4.tcp_max_syn_backlog = 65535
  register: postgresql_sysctl_config
  become: true
  when: "'pg_cluster' in group_names"

- name: Apply PostgreSQL sysctl settings
  ansible.builtin.command: sysctl --system
  become: true
  changed_when: postgresql_sysctl_config.changed
  when:
    - "'pg_cluster' in group_names"
    - postgresql_sysctl_config.changed
