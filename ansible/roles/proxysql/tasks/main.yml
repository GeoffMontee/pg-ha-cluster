---
- name: Install ProxySQL
  ansible.builtin.apt:
    name: "{{ proxysql_package }}"
    state: present
  become: true

- name: Configure ProxySQL for PostgreSQL
  ansible.builtin.template:
    src: proxysql.cnf.j2
    dest: "{{ proxysql_config_file }}"
    owner: root
    group: root
    mode: '0600'
  become: true
  notify: Restart proxysql

- name: Enable and start ProxySQL
  ansible.builtin.systemd:
    name: "{{ proxysql_service }}"
    state: started
    enabled: yes
  become: true

- name: Wait for ProxySQL PostgreSQL listener
  ansible.builtin.wait_for:
    port: "{{ proxysql_pg_port }}"
    host: localhost
    timeout: 60
