---
- name: Install PgCat build dependencies
  ansible.builtin.apt:
    name:
      - cargo
      - build-essential
      - git
      - pkg-config
      - libssl-dev
    state: present
  become: true

- name: Clone PgCat source
  ansible.builtin.git:
    repo: "{{ pgcat_repo_url }}"
    dest: "{{ pgcat_source_dir }}"
    version: "{{ pgcat_repo_version }}"
    update: yes
  become: true
  register: pgcat_source

- name: Check PgCat binary
  ansible.builtin.stat:
    path: "{{ pgcat_binary }}"
  register: pgcat_binary_stat

- name: Build PgCat from source
  ansible.builtin.command: cargo build --release
  args:
    chdir: "{{ pgcat_source_dir }}"
  environment:
    CARGO_HOME: /usr/local/share/cargo
  become: true
  register: pgcat_build
  changed_when: true
  when: pgcat_source.changed or not pgcat_binary_stat.stat.exists

- name: Install PgCat binary
  ansible.builtin.copy:
    src: "{{ pgcat_source_dir }}/target/release/pgcat"
    dest: "{{ pgcat_binary }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  become: true
  when: pgcat_build.changed

- name: Create PgCat group
  ansible.builtin.group:
    name: "{{ pgcat_group }}"
    system: yes
  become: true

- name: Create PgCat user
  ansible.builtin.user:
    name: "{{ pgcat_user }}"
    group: "{{ pgcat_group }}"
    system: yes
    shell: /usr/sbin/nologin
    home: /var/lib/pgcat
    create_home: yes
  become: true

- name: Create PgCat config directory
  ansible.builtin.file:
    path: "{{ pgcat_config_dir }}"
    state: directory
    owner: "{{ pgcat_user }}"
    group: "{{ pgcat_group }}"
    mode: '0750'
  become: true

- name: Configure PgCat
  ansible.builtin.template:
    src: pgcat.toml.j2
    dest: "{{ pgcat_config_file }}"
    owner: "{{ pgcat_user }}"
    group: "{{ pgcat_group }}"
    mode: '0640'
  become: true
  notify: Restart pgcat

- name: Configure PgCat systemd service
  ansible.builtin.template:
    src: pgcat.service.j2
    dest: /etc/systemd/system/{{ pgcat_service }}.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart pgcat

- name: Enable and start PgCat
  ansible.builtin.systemd:
    name: "{{ pgcat_service }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: true

- name: Apply PgCat service or config changes
  ansible.builtin.meta: flush_handlers

- name: Wait for PgCat to be ready
  ansible.builtin.wait_for:
    port: "{{ pgcat_port }}"
    host: localhost
    timeout: 60
  register: pgcat_ready
  failed_when: false

- name: Collect PgCat diagnostics when not ready
  ansible.builtin.shell: |
    systemctl status {{ pgcat_service }} --no-pager || true
    echo "=== journalctl -u {{ pgcat_service }} ==="
    journalctl -u {{ pgcat_service }} -n 120 --no-pager || true
    echo "=== listening ports ==="
    ss -ltnp | grep -E ':({{ pgcat_port }}|{{ pgcat_admin_port }})' || true
  register: pgcat_diagnostics
  changed_when: false
  become: true
  when: pgcat_ready.failed | default(false)

- name: Fail if PgCat is not ready
  ansible.builtin.fail:
    msg: "{{ pgcat_diagnostics.stdout }}"
  when: pgcat_ready.failed | default(false)
